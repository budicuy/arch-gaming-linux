name: Build Arch Gaming Linux ISO

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # ── Restore caches ─────────────────────────────────────────────────
      - name: Restore Custom Kernel Packages Cache
        id: cache-kernel
        uses: actions/cache/restore@v4
        with:
          path: kernel_packages
          key: ${{ runner.os }}-kernel-tkg-${{ hashFiles('kernel/customization.cfg') }}

      - name: Restore Pacman Packages Cache
        id: cache-pacman
        uses: actions/cache/restore@v4
        with:
          path: pacman_cache
          key: ${{ runner.os }}-pacman-${{ hashFiles('.github/workflows/build-iso.yml') }}
          restore-keys: |
            ${{ runner.os }}-pacman-

      - name: Restore Cargo Registry Cache
        id: cache-cargo
        uses: actions/cache/restore@v4
        with:
          path: cargo_cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('installer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Build ──────────────────────────────────────────────────────────
      - name: Build Kernel and ISO in Arch Linux Container
        run: |
          # Buat folder cache lokal di host jika belum ada
          mkdir -p pacman_cache cargo_cache kernel_packages
          
          # Jalankan seluruh proses kompilasi dan build di kontainer Arch Linux dengan mode privileged
          docker run --privileged \
            -v ${{ github.workspace }}:/workspace \
            -v ${{ github.workspace }}/pacman_cache:/var/cache/pacman/pkg \
            -v ${{ github.workspace }}/cargo_cache:/root/.cargo \
            -w /workspace \
            archlinux:latest \
            bash -c "
              echo '-> Mengupdate system keyring & repositori...'
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Syu --noconfirm
              
              echo '-> Memasang peralatan kompilasi dan build ISO...'
              pacman -S --noconfirm archiso rust cargo git base-devel clang llvm lld polly sudo grub syslinux
              
              echo '-> Mengeksekusi pembuatan/pemeriksaan kernel kustom...'
              chmod +x ./kernel/build_kernel_pkg.sh
              ./kernel/build_kernel_pkg.sh
              
              echo '-> Mengompilasi installer Rust & mengemas berkas ISO...'
              cd archiso
              chmod +x ./build.sh
              # Hapus sudo dari pemanggilan mkarchiso di build.sh karena kontainer sudah berjalan sebagai root
              sed -i 's/sudo mkarchiso/mkarchiso/g' build.sh
              ./build.sh
            "
          
          # Kembalikan kepemilikan file cache ke runner user agar bisa disimpan oleh actions/cache
          sudo chown -R $USER:$USER pacman_cache cargo_cache kernel_packages

      # ── Save caches (hanya jika build sukses) ──────────────────────────
      - name: Save Custom Kernel Packages Cache
        uses: actions/cache/save@v4
        with:
          path: kernel_packages
          key: ${{ runner.os }}-kernel-tkg-${{ hashFiles('kernel/customization.cfg') }}

      - name: Save Pacman Packages Cache
        uses: actions/cache/save@v4
        with:
          path: pacman_cache
          key: ${{ runner.os }}-pacman-${{ hashFiles('.github/workflows/build-iso.yml') }}

      - name: Save Cargo Registry Cache
        uses: actions/cache/save@v4
        with:
          path: cargo_cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('installer/Cargo.lock') }}

      # ── Upload & Release ───────────────────────────────────────────────
      - name: Upload Bootable ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arch-Gaming-Linux-ISO
          path: archiso/out/archlinux-*.iso
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: Arch Gaming Linux Latest Build
          body: |
            Automated pre-release build of the custom Arch Gaming Linux ISO.
            
            This ISO includes:
            - Custom `linux-tkg-zen` kernel optimized for low latency.
            - Rust-based TUI installer.
            - System-wide gaming optimizations and dependencies.
          files: archiso/out/archlinux-*.iso
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
