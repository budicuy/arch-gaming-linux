# Sysctl gaming optimization overrides
# Optimized for high memory mapping compatibility, lower swappiness, and low latency networking

# Needed for massive memory allocations in modern Wine/Proton games (e.g. Star Citizen, Hogwarts Legacy)
vm.max_map_count = 2147483642

# Reduce swappiness aggressiveness to avoid dropping files from memory cache to swap disk
vm.swappiness = 10

# Disable split lock mitigation to prevent huge stuttering / frame drops in Steam/Wine games
kernel.split_lock_mitigate = 0

# Network backlog and connection queue limits (high throughput, low latency)
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192

# TCP Syn Backlog limits
net.ipv4.tcp_max_syn_backlog = 8192

# Enable TCP Fast Open (client & server modes) to reduce connection handshake latency
net.ipv4.tcp_fastopen = 3

# Reduce TCP connection timeout limits to free up stale sockets faster
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_probes = 5
net.ipv4.tcp_keepalive_intvl = 15

# Increase local port range
net.ipv4.ip_local_port_range = 1024 65535
