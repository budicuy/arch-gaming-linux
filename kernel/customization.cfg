# Configuration file for linux-tkg build
# Optimized for Ultra Low-Latency Gaming

# CPU scheduler selection
# Available options: "bore", "cfs", "pds", "bmq", "cacule", "tt", "muqss", "eevr"
_sched_yieldtype="bore"

# Compiler optimization choices
# Use Clang instead of GCC for full optimizations
_compiler="clang"

# Link Time Optimization (LTO)
# Options: "none", "thin", "full"
_lto_mode="full"

# Polly Loop Optimizer
# Enable LLVM Polly loop optimizations
_use_polly="true"

# Architecture targeting
# Options: "native", "generic", "x86-64-v2", "x86-64-v3", "x86-64-v4" etc.
# AVX2 instruction set compatibility target
_march="x86-64-v3"

# CPU Mitigations disabling (gives maximum raw performance/FPS boost)
# Options: "true", "false"
_cpu_mitigations="false"

# User-defined kernel config customization (injected during compilation)
# CONFIG_HZ_1000=y -> 1000Hz Timer Frequency
# CONFIG_PREEMPT=y -> Full Preemption model
USER_KERNEL_CONFIG="CONFIG_HZ_1000=y\nCONFIG_PREEMPT=y\nCONFIG_PREEMPT_BUILD=y"

# Base kernel code base
_kernel_base="zen"
